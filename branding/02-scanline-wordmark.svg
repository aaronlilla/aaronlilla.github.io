<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="Afterimage Studio">
  <title>Afterimage Studio — Scanline Wordmark</title>

  <defs>
    <style><![CDATA[
      .bg     { fill: #030406; }
      .word   { font-family: 'Cormorant Garamond', 'EB Garamond', Georgia, 'Times New Roman', serif;
                font-weight: 500; font-style: italic; font-size: 104px; letter-spacing: 0.005em;
                fill: #ece3c8; }
      .sub    { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
                font-weight: 600; font-size: 17px; letter-spacing: 0.40em;
                fill: #ece3c8; opacity: 0.85; }
      .scan   { stroke: #ece3c8; stroke-width: 1.5; opacity: 0.55; }
      .scan-faint { stroke: #ece3c8; stroke-width: 1; opacity: 0.18; }
    ]]></style>
  </defs>

  <rect class="bg" width="800" height="280"/>

  <!-- Scanlines drifting across the wordmark height -->
  <line class="scan-faint" x1="40" y1="118" x2="760" y2="118"/>
  <line class="scan"       x1="40" y1="128" x2="760" y2="128"/>
  <line class="scan-faint" x1="40" y1="138" x2="760" y2="138"/>
  <line class="scan-faint" x1="40" y1="148" x2="760" y2="148"/>
  <line class="scan"       x1="40" y1="158" x2="760" y2="158"/>
  <line class="scan-faint" x1="40" y1="168" x2="760" y2="168"/>

  <text class="word" x="56" y="158">Afterimage</text>

  <text class="sub" x="60" y="208">— S T U D I O —</text>
</svg>
